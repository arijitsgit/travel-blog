<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ari Explores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Sticky Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">✈ Ari Explores</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero-section">
    <div class="hero-content">
      <h1>Ari Explores</h1>
      <p>Stories, photos &amp; adventures from around the world</p>
      <a href="#trips" class="btn-hero">Explore Trips ↓</a>
    </div>
  </header>

  <!-- Trips Section -->
  <section id="trips" class="trips-section">
    <div class="container">
      <h2 class="section-title reveal">Latest Trips</h2>
      <div class="row g-4">

        <!-- Trip Card — copy this block for each new trip -->
        <div class="col-md-6 col-lg-4 reveal">
          <div class="card trip-card h-100">
            <div class="card-img-wrapper">
              <!-- Replace with: <img src="images/trip1/cover.jpg" alt="Trip cover" /> -->
              🌍
            </div>
            <div class="card-body">
              <h5 class="card-title">My First Adventure</h5>
              <p class="card-text">A short description of this amazing trip. Where did you go? What made it special?</p>
              <a href="trip1.html" class="btn-glow mt-2">Read Story →</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center py-4">
    <small>© 2026 Ari Explores · Crafted with passion</small>
  </footer>

  <!-- Back to Top -->
  <button id="backToTop" title="Back to top">↑</button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>

</html>
