<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ari Explores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">✈ Ari Explores</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero-section text-white text-center d-flex align-items-center justify-content-center">
    <div>
      <h1 class="display-3 fw-bold">Ari Explores</h1>
      <p class="lead">Stories, photos & adventures from around the world</p>
    </div>
  </header>

  <!-- Latest Trip Card -->
  <section class="container my-5">
    <h2 class="mb-4 section-title">Latest Trip</h2>
    <div class="row g-4">

      <!-- Add more trip cards by copying this block -->
      <div class="col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm trip-card">
          <img src="images/trip1/cover.jpg" class="card-img-top" alt="Trip cover photo" />
          <div class="card-body">
            <h5 class="card-title">My First Adventure</h5>
            <p class="card-text text-muted">A short description of this amazing trip. Where did you go? What made it special?</p>
            <a href="trip1.html" class="btn btn-dark">Read Story →</a>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <small>© 2026 Ari Explores · Built with ❤️ and Bootstrap</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
